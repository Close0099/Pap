<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login da App Mobile - SmashLab">
    <meta name="theme-color" content="#0f172a">
    
    <title>SmashLab - Acesso App</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/imagem.png">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=20260213-loader">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .app-login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .app-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .app-logo i {
            font-size: 4rem;
            color: #84cc16;
            margin-bottom: 1rem;
        }

        .app-logo h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .app-logo p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .code-input-group {
            margin: 2rem 0;
        }

        .code-input {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            text-align: center;
            font-weight: bold;
            background-color: #1e293b;
            border: 2px solid #334155;
            color: #84cc16;
        }

        .code-input:focus {
            background-color: #1e293b;
            border-color: #84cc16;
            color: #84cc16;
            box-shadow: 0 0 0 0.2rem rgba(132, 204, 22, 0.25);
        }

        .btn-submit-code {
            background-color: #84cc16;
            border: none;
            color: #000;
            font-weight: bold;
            padding: 0.75rem;
            font-size: 1rem;
        }

        .btn-submit-code:hover {
            background-color: #71b30f;
            color: #000;
        }

        .btn-submit-code:disabled {
            background-color: #334155;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .info-text {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .error-message {
            display: none;
            padding: 1rem;
            background-color: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            color: #fca5a5;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .success-message {
            display: none;
            padding: 1rem;
            background-color: rgba(34, 197, 94, 0.1);
            border-left: 3px solid #22c55e;
            color: #86efac;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .loading-spinner {
            display: none;
        }

        .code-status {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .divider {
            text-align: center;
            color: #475569;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #334155;
        }

        .divider span {
            background-color: #0f172a;
            padding: 0 1rem;
            position: relative;
        }

        .btn-web-login {
            background-color: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 0.75rem;
            font-size: 0.9rem;
        }

        .btn-web-login:hover {
            background-color: #1e293b;
            border-color: #84cc16;
            color: #84cc16;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="page-loader" class="page-loader" role="status" aria-live="polite" aria-label="A carregar aplicação">
        <div class="loader-content">
            <div class="loader-logo" aria-hidden="true">Smash<span>Lab</span></div>
            <div class="loader-visual" aria-hidden="true">
                <div class="loader-ring"></div>
                <div class="padel-ball"></div>
                <div class="loader-particles">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
            <p class="loader-text">A validar o teu acesso...</p>
        </div>
    </div>

    <div class="app-login-container" id="login-screen">
        <!-- Logo -->
        <div class="app-logo">
            <i class="bi bi-shield-lock-fill"></i>
            <h1>Smash<span style="color: #84cc16;">Lab</span></h1>
            <p>Acesso à App</p>
        </div>

        <!-- Mensagens -->
        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <!-- Info -->
        <div class="info-text">
            <p>Insira o código de acesso fornecido pelo administrador</p>
        </div>

        <!-- Formulário -->
        <form id="code-login-form">
            <div class="code-input-group">
                <input 
                    type="text" 
                    class="form-control code-input" 
                    id="app-login-code" 
                    placeholder="------" 
                    maxlength="6" 
                    inputmode="numeric"
                    pattern="[0-9]{6}"
                    autocomplete="off"
                    required
                >
                <div class="code-status" id="code-status"></div>
            </div>

            <button type="submit" class="btn btn-submit-code w-100 d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-box-arrow-in-right"></i>
                <span id="btn-text">Entrar</span>
                <span class="spinner-border spinner-border-sm loading-spinner" id="btn-spinner" role="status" aria-hidden="true"></span>
            </button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <span>ou</span>
        </div>

        <!-- Web Login -->
        <a href="index.html" class="btn btn-web-login w-100">
            <i class="bi bi-globe"></i> Fazer Login no Website
        </a>
    </div>

    <!-- Dashboard Screen (Hidden initially) -->
    <div class="app-login-container" id="dashboard-screen" style="display: none;">
        <div class="text-center mb-4">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
            <h5 class="text-white mt-3">Bem-vindo!</h5>
        </div>

        <div class="card card-custom mb-4">
            <div class="card-body text-center">
                <h6 class="text-padel mb-2">👤 <span id="dash-user-name">-</span></h6>
                <small class="text-secondary" id="dash-user-email">-</small>
            </div>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-6">
                <div class="card card-custom text-center">
                    <div class="card-body">
                        <h3 class="text-padel mb-0" id="dash-reservas">0</h3>
                        <small class="text-secondary">Reservas</small>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="card card-custom text-center">
                    <div class="card-body">
                        <h3 class="text-info mb-0" id="dash-messages">0</h3>
                        <small class="text-secondary">Mensagens</small>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-secondary text-center small mb-3">A carregar dashboard...</p>

        <button class="btn btn-padel w-100" onclick="goToDashboard()">
            <i class="bi bi-arrow-right"></i> Ir para Dashboard
        </button>
    </div>


    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=20260213-swfix', { updateViaCache: 'none' })
                .then(registration => {
                    registration.update();
                    if (registration.waiting) {
                        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }
                })
                .catch(err => console.log('SW registration failed:', err));

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });
        }
    </script>

    <!-- Firebase JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Notifications -->
    <script src="js/shared/notifications.js"></script>

    <!-- Loader -->
    <script src="./js/shared/page-loader.js?v=20260213-loader" defer></script>

    <!-- App Login Logic -->
    <script type="module">
        import { auth, db } from './js/core/firebase-config.js';
        import { onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const form = document.getElementById('code-login-form');
        const codeInput = document.getElementById('app-login-code');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        // Garantir sessão anónima para validar código
        async function ensureAnonymousAuth() {
            if (!auth.currentUser) {
                try {
                    await signInAnonymously(auth);
                } catch (error) {
                    console.error('Erro ao autenticar anonimamente:', error);
                    showError('❌ Ative o login anónimo no Firebase Auth e tente novamente.');
                    throw error;
                }
            }
        }

        // Verificar se já está logado
        onAuthStateChanged(auth, async (user) => {
            const hasSession = !!localStorage.getItem('appUserToken');
            if (user && hasSession && !user.isAnonymous) {
                window.location.href = 'app-dashboard.html';
                return;
            }
            if (!user) {
                await ensureAnonymousAuth();
            }
        });

        // Apenas números
        codeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Enviar código
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const code = codeInput.value.trim();

            if (!code || code.length !== 6) {
                showError('Insira um código válido com 6 dígitos');
                return;
            }

            try {
                const btn = form.querySelector('button');
                btn.disabled = true;
                btnText.textContent = 'A validar...';
                btnSpinner.style.display = 'inline-block';

                await ensureAnonymousAuth();

                // Procurar utilizador com este código
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('appLoginCode', '==', code));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    showError('❌ Código inválido ou expirado');
                    btn.disabled = false;
                    btnText.textContent = 'Entrar';
                    btnSpinner.style.display = 'none';
                    return;
                }

                const userDocSnapshot = querySnapshot.docs[0];
                const userData = userDocSnapshot.data();
                const userId = userDocSnapshot.id;

                // Verificar se já foi utilizado
                if (userData.appLoginCodeUsed === true) {
                    showError('❌ Este código já foi utilizado');
                    btn.disabled = false;
                    btnText.textContent = 'Entrar';
                    btnSpinner.style.display = 'none';
                    return;
                }

                // Verificar se não expirou
                let expiresAt = new Date();
                if (userData.appLoginCodeExpiresAt) {
                    if (userData.appLoginCodeExpiresAt.seconds) {
                        expiresAt = new Date(userData.appLoginCodeExpiresAt.seconds * 1000);
                    } else if (typeof userData.appLoginCodeExpiresAt === 'string') {
                        expiresAt = new Date(userData.appLoginCodeExpiresAt);
                    } else {
                        expiresAt = userData.appLoginCodeExpiresAt;
                    }
                }

                if (new Date() > expiresAt) {
                    showError('❌ Código expirado. Peça um novo código ao administrador');
                    btn.disabled = false;
                    btnText.textContent = 'Entrar';
                    btnSpinner.style.display = 'none';
                    return;
                }

                // Verificar se o utilizador não está bloqueado
                if (userData.isBlocked === true) {
                    showError('❌ A sua conta foi bloqueada. Contacte o administrador');
                    btn.disabled = false;
                    btnText.textContent = 'Entrar';
                    btnSpinner.style.display = 'none';
                    return;
                }

                // Gerar token de sessão único
                const sessionToken = generateSessionToken();
                const sessionExpiresAt = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);

                // Guardar sessão no Firestore
                await updateDoc(doc(db, 'users', userId), {
                    appLoginCode: null,
                    appLoginCodeUsed: true,
                    appSessionToken: sessionToken,
                    appSessionExpiresAt: sessionExpiresAt,
                    lastAppLogin: new Date()
                });

                // Guardar info na localStorage
                localStorage.setItem('appUserToken', sessionToken);
                localStorage.setItem('appUserId', userId);
                localStorage.setItem('appUserEmail', userData.email);
                localStorage.setItem('appUserName', userData.name || userData.email);

                // Esconder login e mostrar dashboard
                loginScreen.style.display = 'none';
                dashboardScreen.style.display = 'block';

                // Carregar dados do dashboard
                document.getElementById('dash-user-name').textContent = userData.name || userData.email;
                document.getElementById('dash-user-email').textContent = userData.email;

                // Contar reservas e mensagens
                const reservasRef = collection(db, 'reservas');
                const reservasQuery = query(reservasRef, where('userId', '==', userId));
                const reservasSnapshot = await getDocs(reservasQuery);
                document.getElementById('dash-reservas').textContent = reservasSnapshot.size;

                const messagesRef = collection(db, 'messages');
                const messagesQuery = query(messagesRef, where('userId', '==', userId));
                const messagesSnapshot = await getDocs(messagesQuery);
                document.getElementById('dash-messages').textContent = messagesSnapshot.size;

                // Redirecionar após 3 segundos
                setTimeout(() => {
                    window.location.href = 'app-dashboard.html';
                }, 3000);

            } catch (error) {
                console.error('Erro ao validar código:', error);
                showError('❌ Erro ao validar código. Tente novamente.');
                const btn = form.querySelector('button');
                btn.disabled = false;
                btnText.textContent = 'Entrar';
                btnSpinner.style.display = 'none';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            codeInput.focus();
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function generateSessionToken() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';
            for (let i = 0; i < 32; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        window.goToDashboard = () => {
            window.location.href = 'app-dashboard.html';
        };
    </script>



</body>
</html>

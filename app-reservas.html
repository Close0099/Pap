<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Minhas Reservas - SmashLab App">
    <meta name="theme-color" content="#0f172a">
    
    <title>Minhas Reservas - SmashLab App</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/imagem.png">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=20260213-loader">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- Loading Screen -->
    <div id="page-loader" class="page-loader" role="status" aria-live="polite" aria-label="A carregar aplicação">
        <div class="loader-content">
            <div class="loader-logo" aria-hidden="true">Smash<span>Lab</span></div>
            <div class="loader-visual" aria-hidden="true">
                <div class="loader-ring"></div>
                <div class="padel-ball"></div>
                <div class="loader-particles">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
            <p class="loader-text">A carregar reservas...</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <a href="app-dashboard.html" class="navbar-brand mb-0 h1">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <span class="h6 mb-0">Minhas Reservas</span>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid p-4">
        <div id="reservas-container">
            <div class="text-center py-4">
                <div class="spinner-border text-padel" role="status"></div>
                <p class="mt-2 text-secondary">A carregar reservas...</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Notifications -->
    <script src="js/shared/notifications.js"></script>

    <!-- Loader -->
    <script src="./js/shared/page-loader.js?v=20260213-loader" defer></script>

    <!-- App Reservas Logic -->
    <script type="module">
        import { checkAppSession, clearAppSession } from './js/features/app-auth.js';
        import { db } from './js/core/firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const container = document.getElementById('reservas-container');

        async function loadReservas() {
            const session = await checkAppSession();

            if (!session) {
                window.location.href = 'app-login.html';
                return;
            }

            try {
                const reservasRef = collection(db, 'reservas');
                const q = query(reservasRef, where('userId', '==', session.id));
                const querySnapshot = await getDocs(q);

                const reservas = [];
                querySnapshot.forEach(doc => {
                    reservas.push({ id: doc.id, ...doc.data() });
                });

                // Ordenar por data (mais recentes primeiro)
                reservas.sort((a, b) => {
                    const dateA = new Date(a.date + ' ' + (a.time || '00:00'));
                    const dateB = new Date(b.date + ' ' + (b.time || '00:00'));
                    return dateB - dateA;
                });

                if (reservas.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-5">
                            <i class="bi bi-calendar-x fs-1 text-secondary d-block mb-3"></i>
                            <p class="text-secondary">Nenhuma reserva ainda.</p>
                        </div>
                    `;
                    return;
                }

                // Agrupar por status
                const upcoming = reservas.filter(r => r.status !== 'Recusado');
                const rejected = reservas.filter(r => r.status === 'Recusado');

                let html = '';

                if (upcoming.length > 0) {
                    html += '<h6 class="text-padel mb-3">Próximas Reservas</h6>';
                    html += '<div class="row g-3 mb-4">';
                    upcoming.forEach(r => {
                        const status = r.status || 'Pendente';
                        const statusColor = status === 'Aprovado' ? 'success' : status === 'Pendente' ? 'warning' : 'danger';
                        const displayDate = new Date(r.date + 'T12:00:00').toLocaleDateString('pt-PT');
                        
                        html += `
                            <div class="col-12">
                                <div class="card card-custom">
                                    <div class="card-body">
                                        <div class="row align-items-start">
                                            <div class="col">
                                                <h6 class="mb-1">🏸 ${r.court || 'Campo'}</h6>
                                                <small class="text-secondary">${displayDate} - ${r.time || '00:00'}</small>
                                            </div>
                                            <div class="col-auto">
                                                <span class="badge bg-${statusColor}">${status}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                if (rejected.length > 0) {
                    html += '<h6 class="text-secondary mb-3">Recusadas</h6>';
                    html += '<div class="row g-3">';
                    rejected.forEach(r => {
                        const displayDate = new Date(r.date + 'T12:00:00').toLocaleDateString('pt-PT');
                        
                        html += `
                            <div class="col-12">
                                <div class="card card-custom opacity-75">
                                    <div class="card-body">
                                        <div class="row align-items-start">
                                            <div class="col">
                                                <h6 class="mb-1 text-secondary">🏸 ${r.court || 'Campo'}</h6>
                                                <small class="text-secondary">${displayDate} - ${r.time || '00:00'}</small>
                                            </div>
                                            <div class="col-auto">
                                                <span class="badge bg-danger">Recusada</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                container.innerHTML = html;

            } catch (error) {
                console.error('Erro ao carregar reservas:', error);
                container.innerHTML = `
                    <div class="text-center py-5">
                        <p class="text-danger">❌ Erro ao carregar reservas</p>
                    </div>
                `;
            }
        }

        window.logout = async () => {
            clearAppSession();
            window.location.href = 'app-login.html';
        };

        // Carregar ao iniciar
        loadReservas();
    </script>

</body>
</html>

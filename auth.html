<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmashLab - Login e Registo">
    <meta name="theme-color" content="#0f172a">

    <title>SmashLab - Entrar</title>
    <link rel="icon" type="image/png" href="img/imagem.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css?v=20260304-auth">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=20260213-swfix', { updateViaCache: 'none' })
                .then(registration => {
                    registration.update();
                    if (registration.waiting) {
                        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }
                })
                .catch(err => console.log('SW registration failed:', err));

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });
        }
    </script>
</head>
<body>

    <div id="page-loader" class="page-loader" role="status" aria-live="polite" aria-label="A carregar aplicação">
        <div class="loader-content">
            <div class="loader-logo" aria-hidden="true">Smash<span>Lab</span></div>
            <div class="loader-visual" aria-hidden="true">
                <div class="loader-ring"></div>
                <div class="padel-ball"></div>
                <div class="loader-particles">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
            <p class="loader-text">A preparar autenticação...</p>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg w-100 navbar-dark">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold text-white" href="index.html">
                Smash<span class="text-padel">Lab</span>
            </a>
            <a href="index.html" class="btn btn-outline-secondary btn-sm px-3">Início</a>
        </div>
    </nav>

    <section class="hero-section">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="assets/YTDown.com_YouTube_Adidas-Padel-promo-video-short_Media_Px1NaszfPU4_001_1080p.mp4" type="video/mp4">
            Seu navegador não suporta vídeos HTML5.
        </video>
        <div class="hero-overlay"></div>
        <div class="bottom-gradient"></div>

        <div class="container position-relative">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8 col-12">
                    <div class="auth-card p-4 p-md-5">
                        <ul class="nav nav-pills nav-fill mb-4" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active rounded-pill" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-content" type="button" role="tab">Login</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link rounded-pill" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-content" type="button" role="tab">Registar</button>
                            </li>
                        </ul>

                        <div class="tab-content" id="authTabContent">
                            <div class="tab-pane fade show active" id="login-content" role="tabpanel">
                                <div id="login-form">
                                    <form>
                                        <div class="mb-3">
                                            <label for="login-email" class="form-label text-secondary">Email</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                                                <input type="email" class="form-control bg-dark border-secondary text-white" id="login-email" placeholder="nome@exemplo.com" required>
                                            </div>
                                        </div>
                                        <div class="mb-4">
                                            <label for="login-password" class="form-label text-secondary">Senha</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                                                <input type="password" class="form-control bg-dark border-secondary text-white" id="login-password" placeholder="••••••••" required>
                                            </div>
                                            <div class="text-center mt-3">
                                                <a href="#" class="text-secondary small text-decoration-none" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Esqueceu-se da palavra-passe?</a>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-padel w-100 py-2">Entrar</button>
                                    </form>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="register-content" role="tabpanel">
                                <div id="register-form">
                                    <form>
                                        <div class="mb-3">
                                            <label for="register-name" class="form-label text-secondary">Nome Completo</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person"></i></span>
                                                <input type="text" class="form-control bg-dark border-secondary text-white" id="register-name" placeholder="O teu nome" required>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label for="register-email" class="form-label text-secondary">Email</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                                                <input type="email" class="form-control bg-dark border-secondary text-white" id="register-email" placeholder="nome@exemplo.com" required>
                                            </div>
                                        </div>
                                        <div class="mb-4">
                                            <label for="register-password" class="form-label text-secondary">Senha</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                                                <input type="password" class="form-control bg-dark border-secondary text-white" id="register-password" placeholder="Mínimo 6 caracteres" required>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label text-secondary d-block mb-2">Captcha</label>
                                            <div class="d-flex align-items-center gap-2 mb-2">
                                                <span id="register-captcha-question" class="badge text-bg-secondary fs-6 px-3 py-2">-</span>
                                                <button type="button" id="refresh-captcha-btn" class="btn btn-outline-secondary btn-sm" aria-label="Gerar novo captcha">
                                                    <i class="bi bi-arrow-clockwise"></i>
                                                </button>
                                            </div>
                                            <input type="number" class="form-control bg-dark border-secondary text-white" id="register-captcha-answer" placeholder="Resposta do captcha" required>
                                        </div>
                                        <div class="form-check mb-4">
                                            <input class="form-check-input" type="checkbox" value="1" id="register-terms" required>
                                            <label class="form-check-label text-secondary" for="register-terms">
                                                Li e aceito os <a href="termos.html" target="_blank" rel="noopener" class="text-padel text-decoration-none">Termos e Condições</a>.
                                            </label>
                                        </div>
                                        <button type="submit" class="btn btn-padel w-100 py-2">Criar Conta</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Recuperar Palavra-passe</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-secondary">Insira o seu email para receber um link de redefinição de palavra-passe.</p>
                    <form id="reset-password-form">
                        <div class="mb-3">
                            <label for="reset-email" class="form-label text-secondary">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control bg-dark border-secondary text-white" id="reset-email" placeholder="nome@exemplo.com" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-padel w-100">Enviar Email de Recuperação</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/shared/page-loader.js?v=20260213-loader" defer></script>
    <script type="module" src="./js/features/auth.js"></script>

</body>
</html>

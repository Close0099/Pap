<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mensagens - SmashLab App">
    <meta name="theme-color" content="#0f172a">
    
    <title>Mensagens - SmashLab App</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/imagem.png">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=20260213-loader">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- Loading Screen -->
    <div id="page-loader" class="page-loader" role="status" aria-live="polite" aria-label="A carregar aplicação">
        <div class="loader-content">
            <div class="loader-logo" aria-hidden="true">Smash<span>Lab</span></div>
            <div class="loader-visual" aria-hidden="true">
                <div class="loader-ring"></div>
                <div class="padel-ball"></div>
                <div class="loader-particles">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
            <p class="loader-text">A carregar mensagens...</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <a href="app-dashboard.html" class="navbar-brand mb-0 h1">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <span class="h6 mb-0">Mensagens</span>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid p-4">
        <div id="messages-container">
            <div class="text-center py-4">
                <div class="spinner-border text-padel" role="status"></div>
                <p class="mt-2 text-secondary">A carregar mensagens...</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Notifications -->
    <script src="js/shared/notifications.js"></script>

    <!-- Loader -->
    <script src="./js/shared/page-loader.js?v=20260213-loader" defer></script>

    <!-- App Messages Logic -->
    <script type="module">
        import { checkAppSession, clearAppSession } from './js/features/app-auth.js';
        import { db } from './js/core/firebase-config.js';
        import { collection, query, where, getDocs, orderBy, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const container = document.getElementById('messages-container');

        async function loadMessages() {
            const session = await checkAppSession();

            if (!session) {
                window.location.href = 'app-login.html';
                return;
            }

            try {
                const messagesRef = collection(db, 'messages');
                const q = query(
                    messagesRef,
                    where('userId', '==', session.id)
                );
                const querySnapshot = await getDocs(q);

                const messages = [];
                querySnapshot.forEach(doc => {
                    messages.push({ id: doc.id, ...doc.data() });
                });

                // Ordenar por data (mais recentes primeiro)
                messages.sort((a, b) => {
                    const dateA = a.createdAt?.seconds ? new Date(a.createdAt.seconds * 1000) : new Date(a.createdAt);
                    const dateB = b.createdAt?.seconds ? new Date(b.createdAt.seconds * 1000) : new Date(b.createdAt);
                    return dateB - dateA;
                });

                // Agrupar não lidas e lidas
                const unread = messages.filter(m => m.read !== true);
                const read = messages.filter(m => m.read === true);

                if (messages.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-5">
                            <i class="bi bi-chat-left-text fs-1 text-secondary d-block mb-3"></i>
                            <p class="text-secondary">Nenhuma mensagem ainda.</p>
                        </div>
                    `;
                    return;
                }

                let html = '';

                if (unread.length > 0) {
                    html += '<h6 class="text-info mb-3">Não Lidas</h6>';
                    html += '<div class="row g-3 mb-4">';
                    unread.forEach(m => {
                        const date = m.createdAt?.seconds ? new Date(m.createdAt.seconds * 1000).toLocaleDateString('pt-PT') : '-';
                        html += `
                            <div class="col-12">
                                <div class="card card-custom border-info cursor-pointer" onclick="markAsRead('${m.id}')">
                                    <div class="card-body">
                                        <div class="row align-items-start">
                                            <div class="col">
                                                <h6 class="mb-1">📨 ${m.title}</h6>
                                                <p class="text-secondary small mb-1">${m.content}</p>
                                                <small class="text-secondary">${date} • ${m.from || 'Admin'}</small>
                                            </div>
                                            <div class="col-auto">
                                                <span class="badge bg-info">Nova</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                if (read.length > 0) {
                    html += '<h6 class="text-secondary mb-3">Lidas</h6>';
                    html += '<div class="row g-3">';
                    read.forEach(m => {
                        const date = m.createdAt?.seconds ? new Date(m.createdAt.seconds * 1000).toLocaleDateString('pt-PT') : '-';
                        html += `
                            <div class="col-12">
                                <div class="card card-custom opacity-75">
                                    <div class="card-body">
                                        <div class="row align-items-start">
                                            <div class="col">
                                                <h6 class="mb-1 text-secondary">📧 ${m.title}</h6>
                                                <p class="text-secondary small mb-1">${m.content}</p>
                                                <small class="text-secondary">${date} • ${m.from || 'Admin'}</small>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                container.innerHTML = html;

            } catch (error) {
                console.error('Erro ao carregar mensagens:', error);
                container.innerHTML = `
                    <div class="text-center py-5">
                        <p class="text-danger">❌ Erro ao carregar mensagens</p>
                    </div>
                `;
            }
        }

        window.markAsRead = async (messageId) => {
            try {
                await updateDoc(doc(db, 'messages', messageId), {
                    read: true
                });
                loadMessages();
            } catch (error) {
                console.error('Erro ao marcar como lida:', error);
            }
        };

        window.logout = async () => {
            clearAppSession();
            window.location.href = 'app-login.html';
        };

        // Carregar ao iniciar
        loadMessages();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Meu Perfil - Gerenciar dados e preferências na plataforma SmashLab">
    <meta name="keywords" content="perfil, usuário, padel">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Open Graph Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Meu Perfil - SmashLab">
    <meta property="og:description" content="Gerencie seu perfil na SmashLab">
    
    <title>Meu Perfil - SmashLab</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/imagem.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }
    </script>
</head>
<body class="bg-dark text-white">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="bi bi-trophy-fill text-padel"></i>
            </div>
            <h5 class="sidebar-title mb-0">Smash<span class="text-padel">Lab</span></h5>
            <button class="btn-close-sidebar d-lg-none" onclick="toggleSidebar()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        
        <div class="sidebar-user">
            <div class="user-avatar">
                <i class="bi bi-person-circle fs-2"></i>
            </div>
            <div class="user-info">
                <span id="user-name-sidebar" class="user-name">...</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html?action=new-booking" class="sidebar-link">
                <i class="bi bi-calendar-plus"></i>
                <span>Nova Reserva</span>
            </a>
            <a href="dashboard.html?section=minhas-reservas" class="sidebar-link">
                <i class="bi bi-calendar-check"></i>
                <span>Minhas Reservas</span>
            </a>
            <a href="calendar.html" class="sidebar-link">
                <i class="bi bi-calendar3"></i>
                <span>Calendário</span>
            </a>
            <a href="dashboard.html?section=user-stats" class="sidebar-link">
                <i class="bi bi-bar-chart-fill"></i>
                <span>Minhas Estatísticas</span>
            </a>
            <a href="profile.html" class="sidebar-link active">
                <i class="bi bi-person"></i>
                <span>Perfil</span>
            </a>
            
            <!-- Badge de Mensagens -->
            <a href="#" class="sidebar-link position-relative" id="message-badge-btn" onclick="showMessagesModal()" style="display: none;">
                <i class="bi bi-envelope-fill"></i>
                <span>Mensagens</span>
                <span id="message-count-badge" class="sidebar-badge">0</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button onclick="logout()" class="sidebar-link text-danger w-100 border-0 bg-transparent">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sair</span>
            </button>
        </div>
    </div>

    <!-- Mobile Toggle -->
    <button class="btn-toggle-sidebar d-lg-none" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <!-- Conteúdo Principal -->
    <div class="main-content">
        <div class="container py-5">
            <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card card-custom p-4">
                    <div class="text-center mb-4">
                        <div class="bg-dark rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px; border: 2px solid #a3e635;">
                            <i class="bi bi-person-fill fs-1 text-white"></i>
                        </div>
                        <h3 class="text-white">Meu Perfil</h3>
                    </div>

                    <form id="profile-form">
                        <div class="mb-3">
                            <label class="form-label text-secondary">Nome</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white" id="profile-name" placeholder="O teu nome">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Email</label>
                            <input type="email" class="form-control bg-dark border-secondary text-secondary" id="profile-email" readonly disabled>
                            <div class="form-text text-secondary small">O email não pode ser alterado.</div>
                        </div>
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-padel fw-bold">
                                <i class="bi bi-save"></i> Guardar Alterações
                            </button>
                        </div>
                    </form>

                    <hr class="border-secondary my-4">

                    <!-- Estatísticas -->
                    <div class="mb-4">
                        <h6 class="text-white mb-3"><i class="bi bi-bar-chart"></i> Estatísticas</h6>
                        
                        <div class="row text-center mb-3">
                            <div class="col-6">
                                <h5 class="text-white mb-0" id="total-bookings">0</h5>
                                <small class="text-secondary">Reservas Totais</small>
                            </div>
                            <div class="col-6">
                                <h5 class="text-white mb-0" id="member-since">--</h5>
                                <small class="text-secondary">Membro Desde</small>
                            </div>
                        </div>

                        <div class="row text-center mb-3">
                            <div class="col-6">
                                <h5 class="text-white mb-0" id="total-spent">0€</h5>
                                <small class="text-secondary">Gasto Total</small>
                            </div>
                            <div class="col-6">
                                <h5 class="text-white mb-0" id="favorite-court">--</h5>
                                <small class="text-secondary">Campo Favorito</small>
                            </div>
                        </div>

                        <div class="p-3 rounded bg-dark border border-secondary">
                            <small class="text-secondary d-block mb-2"><i class="bi bi-clock"></i> Horários Preferidos:</small>
                            <div id="favorite-times" class="d-flex gap-2 flex-wrap">
                                <span class="badge bg-secondary">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <div class="modal fade" id="messagesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark border-secondary text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">📩 Mensagens do Admin</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="messages-container">
                        <div class="text-center py-4">
                            <div class="spinner-border text-padel" role="status"></div>
                            <p class="mt-2 text-secondary">A carregar mensagens...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Lógica do Perfil -->
    <script type="module" src="./js/features/profile.js"></script>

    <!-- Sidebar Script -->
    <script type="module">
        import { auth, db } from './js/core/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Sidebar Actions
        window.logout = async () => {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Erro ao sair:", error);
            }
        };

        window.toggleSidebar = () => {
             document.getElementById('sidebar').classList.toggle('active');
        };

        // Populate Sidebar User Name
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                     const docSnap = await getDoc(doc(db, "users", user.uid));
                     const nameEl = document.getElementById('user-name-sidebar');
                     if (nameEl) {
                        if (docSnap.exists()) {
                             nameEl.textContent = docSnap.data().name;
                        } else {
                             nameEl.textContent = user.email.split('@')[0];
                        }
                     }
                } catch (e) {
                     console.error("Erro sidebar:", e);
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calendário - SmashLab App">
    <meta name="theme-color" content="#0f172a">
    
    <title>Calendário - SmashLab App</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/imagem.png">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=20260213-loader">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

</head>
<body>

    <!-- Loading Screen -->
    <div id="page-loader" class="page-loader" role="status" aria-live="polite" aria-label="A carregar aplicação">
        <div class="loader-content">
            <div class="loader-logo" aria-hidden="true">Smash<span>Lab</span></div>
            <div class="loader-visual" aria-hidden="true">
                <div class="loader-ring"></div>
                <div class="padel-ball"></div>
                <div class="loader-particles">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
            <p class="loader-text">A carregar calendário...</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <a href="app-dashboard.html" class="navbar-brand mb-0 h1">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <span class="h6 mb-0">Calendário</span>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid p-4">
        <div id="calendar-container">
            <div class="text-center py-4">
                <div class="spinner-border text-padel" role="status"></div>
                <p class="mt-2 text-secondary">A carregar calendário...</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Notifications -->
    <script src="js/shared/notifications.js"></script>

    <!-- Loader -->
    <script src="./js/shared/page-loader.js?v=20260213-loader" defer></script>

    <!-- App Calendar Logic -->
    <script type="module">
        import { checkAppSession, clearAppSession } from './js/features/app-auth.js';
        import { db } from './js/core/firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const container = document.getElementById('calendar-container');
        let currentDate = new Date();
        let reservasMap = {};

        async function loadReservas() {
            const session = await checkAppSession();

            if (!session) {
                window.location.href = 'app-login.html';
                return;
            }

            try {
                const reservasRef = collection(db, 'reservas');
                const q = query(reservasRef, where('userId', '==', session.id));
                const querySnapshot = await getDocs(q);

                querySnapshot.forEach(doc => {
                    const r = doc.data();
                    const dateKey = r.date || '';
                    if (!reservasMap[dateKey]) {
                        reservasMap[dateKey] = [];
                    }
                    reservasMap[dateKey].push(r);
                });

                renderCalendar();

            } catch (error) {
                console.error('Erro ao carregar reservas:', error);
                container.innerHTML = `
                    <div class="text-center py-5">
                        <p class="text-danger">❌ Erro ao carregar calendário</p>
                    </div>
                `;
            }
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            let html = `
                <div class="calendar-nav">
                    <button class="btn btn-sm btn-outline-secondary" onclick="prevMonth()">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <h6 class="mb-0">${new Date(year, month).toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' })}</h6>
                    <button class="btn btn-sm btn-outline-secondary" onclick="nextMonth()">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>

                <div class="calendar-grid">
                    <div class="calendar-day-name">Dom</div>
                    <div class="calendar-day-name">Seg</div>
                    <div class="calendar-day-name">Ter</div>
                    <div class="calendar-day-name">Qua</div>
                    <div class="calendar-day-name">Qui</div>
                    <div class="calendar-day-name">Sex</div>
                    <div class="calendar-day-name">Sab</div>
            `;

            // Dias do mês anterior
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            // Dias deste mês
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = date.toISOString().split('T')[0];
                
                const isToday = date.toDateString() === today.toDateString();
                const hasBooking = reservasMap[dateStr] && reservasMap[dateStr].length > 0;

                let classNames = 'calendar-day';
                if (isToday) classNames += ' today';
                if (hasBooking) classNames += ' has-booking';

                const bookingCount = hasBooking ? reservasMap[dateStr].length : 0;
                const content = bookingCount > 0 ? `${day}<br><small>${bookingCount}</small>` : day;

                html += `<div class="${classNames}">${content}</div>`;
            }

            // Dias do próximo mês
            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            for (let day = 1; day <= totalCells - firstDay - daysInMonth; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            html += `</div>`;

            container.innerHTML = html;
        }

        window.prevMonth = () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        };

        window.nextMonth = () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        };

        window.logout = async () => {
            clearAppSession();
            window.location.href = 'app-login.html';
        };

        // Carregar ao iniciar
        loadReservas();
    </script>

</body>
</html>
